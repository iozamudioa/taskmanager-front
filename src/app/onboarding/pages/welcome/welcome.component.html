<div class="welcome-wrapper">
    <div class="hero">
        <div class="hero-icon">🏠</div>
        <h1 class="hero-title">TaskManager</h1>
        <p class="hero-subtitle">Organiza las tareas de tu hogar de forma fácil y colaborativa.</p>
    </div>

    <div class="actions">
        <button class="btn btn-primary" (click)="goOpenExistingHouse()">
            <span class="btn-icon">🔓</span>
            Abrir casa existente
        </button>
        <button class="btn btn-secondary" (click)="goCreateHouse()">
            <span class="btn-icon">✨</span>
            Crear una nueva casa
        </button>
        <button class="btn btn-tertiary" (click)="goJoinHouse()">
            <span class="btn-icon">🔑</span>
            Unirme con cuenta nueva
        </button>
        <button class="btn btn-quaternary" (click)="goJoinHouseExisting()">
            <span class="btn-icon">👤</span>
            Ya tengo usuario, unirme
        </button>
    </div>

    <p class="footer-text">Empieza en menos de 2 minutos</p>
</div>
